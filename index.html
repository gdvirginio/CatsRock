<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cats Rock</title>
    <link rel="stylesheet" href="styles/style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Story+Script&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: rgb(194, 177, 149);
            color: white;
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            user-select: none;
            transition: all 0.3s;
        }

        #msg {
            transition: color 0.3s;
            color: white;
            font-family: sans-serif;
            font-size: 30px;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .decisao {
            display: flex;
            gap: 20px;
        }

        .decisao img {
            width: 50px;
            height: 50px;
        }

        .caixa {
            background-color: rgb(126, 111, 85);
            border-radius: 5px;
            width: 350px;
            height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            gap: 20px;
        }

        @keyframes cat-ataque {
            0%   { transform: rotate(0deg); }
            50%  { transform: rotate(45deg); }
            75%  { transform: rotate(-45deg); }
            100% { transform: rotate(0deg); }
        }

        @keyframes shake {
            0%   { transform: translateX(0); }
            25%  { transform: translateX(-5px); }
            50%  { transform: translateX(5px); }
            75%  { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        @keyframes aparecer {
            0%   { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .shake {
            animation: shake 1s;
        }

        .bot {
            font-family: "Story Script", sans-serif;
            font-weight: bold;
            display: flex;
            text-align: center;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            font-size: 50px;
            transition: 0.3s all;
            color: rgb(62, 56, 45);
        }

        .cat-ataque {
            animation: cat-ataque 1s ease-in-out;
        }

        button {
            border: none;
            border-radius: 10px;
            background-color: rgb(214, 191, 150);
            box-shadow: 0 0 10px black;
            width: 200px;
            height: 55px;
            color: rgb(32, 31, 29);
            transition: all 0.3s;
            font-size: 20px;
            text-align: center;
        }

        button:hover {
            transform: scale(1.1);
            cursor: pointer;
        }

        .click {
            transform: scale(1) !important;
        }

        .respostaBot img {
            width: 50px;
            height: 50px;
            visibility: hidden;
        }

        .respostaBotsim {
            visibility: visible !important;
        }

        /* Tela inicial */
        #tela-inicio {
            display: flex;
            position: fixed;
            inset: 0;
            background-color: rgb(194, 177, 149);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 30px;
            z-index: 200;
        }

        #tela-inicio.oculta {
            display: none;
        }

        .titulo-inicio {
            font-family: "Story Script", sans-serif;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            font-size: 50px;
            color: rgb(62, 56, 45);
        }

        #tela-inicio h2 {
            font-family: sans-serif;
            font-size: 22px;
            color: rgb(62, 56, 45);
            font-weight: normal;
        }

        .dificuldades {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .btn-dificuldade {
            width: 280px;
            height: 65px;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-dificuldade span.desc {
            font-size: 13px;
            color: rgb(100, 85, 65);
            display: block;
        }

        .btn-dificuldade .conteudo {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.3;
        }

        @media (max-width: 768px) {
            #tela-inicio .bot {
                font-size: 30px;
            }
            .btn-dificuldade {
                width: 90%;
                max-width: 280px;
            }
        }

        /* Tela de fim de jogo */
        #tela-fim {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.6);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #tela-fim.ativa {
            display: flex;
        }

        #caixa-fim {
            background-color: rgb(126, 111, 85);
            border-radius: 12px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            font-family: "Story Script", sans-serif;
            text-align: center;
            animation: aparecer 0.3s ease-out;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        #titulo-fim {
            font-size: 48px;
            color: white;
        }

        #subtitulo-fim {
            font-size: 22px;
            font-family: sans-serif;
            color: rgb(214, 191, 150);
        }

        #btn-reiniciar {
            margin-top: 10px;
            font-family: sans-serif;
            font-size: 18px;
            width: 180px;
            height: 50px;
        }

        @media (max-width: 768px) {
            body {
                padding: 20px;
                height: auto;
            }
            .bot {
                font-size: 28px;
            }
            #msg {
                font-size: 22px;
            }
            .caixa {
                background-color: rgb(126, 111, 85);
                border-radius: 5px;
                width: 80%;
                height: 100px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                font-size: 20px;
                gap: 20px;
            }
            .decisao {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
            button {
                width: 90%;
                max-width: 250px;
                height: 50px;
            }
            .decisao img {
                width: 40px;
                height: 40px;
            }
            .respostaBot img {
                width: 40px;
                height: 40px;
            }
            #cat {
                width: 180px;
                height: auto;
            }
            #titulo-fim {
                font-size: 32px;
            }
        }
    </style>
</head>

<body>

    <!-- Tela inicial -->
    <div id="tela-inicio">
        <div class="titulo-inicio">
            <img src="imgs/Pixel Cat.png" alt="" style="width:120px;">
            <span>Cats Rock</span>
        </div>
        <h2>Escolha a dificuldade:</h2>
        <div class="dificuldades">
            <button class="btn-dificuldade" data-dificuldade="facil">
                <div class="conteudo">
                    <span>🐱 Gato Burro</span>
                    <span class="desc">Joga no aleatório</span>
                </div>
            </button>
            <button class="btn-dificuldade" data-dificuldade="medio">
                <div class="conteudo">
                    <span>😼 Gato Inteligente</span>
                    <span class="desc">Tenta te ganhar às vezes</span>
                </div>
            </button>
            <button class="btn-dificuldade" data-dificuldade="dificil">
                <div class="conteudo">
                    <span>😾 Super Inteligente</span>
                    <span class="desc">Quase sempre trapaceia</span>
                </div>
            </button>
        </div>
    </div>

    <!-- Tela de fim de jogo -->
    <div id="tela-fim">
        <div id="caixa-fim">
            <span id="titulo-fim"></span>
            <span id="subtitulo-fim"></span>
            <button id="btn-reiniciar">Jogar de novo</button>
        </div>
    </div>

    <div class="bot">
        <div class="respostaBot">
            <img src="imgs/Pedra.png" id="valor0">
            <img src="imgs/Papel.png" id="valor1">
            <img src="imgs/Tesoura.png" id="valor2">
        </div>
        <span>Sir Miagulino</span>
        <span id="msg"></span>
        <img src="imgs/Pixel Cat.png" id="cat" alt="">
    </div>

    <div class="decisao">
        <button data-valor="0"><img src="imgs/Pedra.png" alt="Pedra"></button>
        <button data-valor="1"><img src="imgs/Papel.png" alt="Papel"></button>
        <button data-valor="2"><img src="imgs/Tesoura.png" alt="Tesoura"></button>
    </div>

    <div class="caixa">
        <span id="placar"></span>
    </div>

    <script>
        const clickSound = new Audio('/CatsRock/sounds/click-sound.mp3')
        const timerSound = new Audio('/CatsRock/sounds/timer.mp3')
        const gatoBravo  = new Audio('/CatsRock/sounds/gato-bravo.mp3')
        const gatoFeliz  = new Audio('/CatsRock/sounds/gato-feliz.mp3')

        const placar     = document.getElementById('placar')
        const msg        = document.getElementById('msg')
        const cat        = document.getElementById('cat')
        const telaFim    = document.getElementById('tela-fim')
        const tituloFim  = document.getElementById('titulo-fim')
        const subtituloFim = document.getElementById('subtitulo-fim')
        const btnReiniciar = document.getElementById('btn-reiniciar')

        const valor0 = document.getElementById('valor0')
        const valor1 = document.getElementById('valor1')
        const valor2 = document.getElementById('valor2')
        const imgsBot = [valor0, valor1, valor2]

        const telaInicio  = document.getElementById('tela-inicio')

        let placarPlayer = 0
        let placarBot    = 0
        let rankPlayer   = '🐭 Novato'
        let valor        = 0
        let valorBot     = 0
        let jogando      = false
        let dificuldade  = 'medio'

        const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms))

        // ─── Tela inicial ───────────────────────────────────────────────────
        document.querySelectorAll('.btn-dificuldade').forEach(btn => {
            btn.addEventListener('click', () => {
                dificuldade = btn.dataset.dificuldade
                telaInicio.classList.add('oculta')
                atualizarPlacar()
            })
        })
        // ────────────────────────────────────────────────────────────────────

        // ─── Listeners unificados ───────────────────────────────────────────
        document.querySelectorAll('.decisao button').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (jogando) return
                jogando = true

                clickSound.play()
                valor = Number(btn.dataset.valor)

                btn.classList.add('click')
                await wait(300)
                btn.classList.remove('click')

                botPlay()
                await verificarValor()

                jogando = false
            })
        })

        btnReiniciar.addEventListener('click', () => {
            telaFim.classList.remove('ativa')
            telaInicio.classList.remove('oculta')
            placarPlayer = 0
            placarBot    = 0
            rankPlayer   = '🐭 Novato'
        })
        // ────────────────────────────────────────────────────────────────────

        async function verificarValor() {
            let ganhou

            if (valor === valorBot) {
                ganhou = 'empate'
            } else if (
                (valor === 0 && valorBot === 2) ||
                (valor === 1 && valorBot === 0) ||
                (valor === 2 && valorBot === 1)
            ) {
                ganhou = true
            } else {
                ganhou = false
            }

            await wait(1000)
            timerSound.play()

            msg.style.color = '#C0392B'
            msg.innerHTML = 'Pedra...'
            await wait(1000)

            msg.style.color = '#1F618D'
            msg.innerHTML = 'Papel...'
            await wait(1000)

            msg.style.color = '#D68910'
            msg.innerHTML = 'Tesoura...'
            await wait(1000)

            msg.style.color = '#196F3D'
            msg.innerHTML = 'JÁ!'
            await wait(500)

            imgsBot[valorBot].classList.add('respostaBotsim')
            await wait(1000)
            imgsBot.forEach(img => img.classList.remove('respostaBotsim'))

            msg.style.color = 'white'

            if (ganhou === true) {
                msg.innerHTML = 'Miau! Você venceu!'
                placarPlayer++
                document.body.style.backgroundColor = '#B7E4C7'
                gatoBravo.play()
            } else if (ganhou === false) {
                msg.innerHTML = 'Hahaha humano fraco!'
                placarBot++
                document.body.style.backgroundColor = '#E57373'
                document.body.classList.add('shake')
                cat.classList.add('cat-ataque')
                await wait(1000)
                cat.classList.remove('cat-ataque')
                gatoFeliz.play()
                document.body.classList.remove('shake')
            } else {
                msg.innerHTML = '...Empatamos'
                document.body.style.backgroundColor = '#A9A9A9'
            }

            await wait(1000)
            document.body.style.backgroundColor = 'rgb(194, 177, 149)'

            atualizarRank()
            atualizarPlacar()

            await wait(1000)
            msg.innerHTML = ''

            if (placarPlayer >= 10) {
                tituloFim.innerHTML = '🏆 Você ganhou!'
                subtituloFim.innerHTML = `Rank final: ${rankPlayer}`
                telaFim.classList.add('ativa')
            } else if (placarBot >= 10) {
                tituloFim.innerHTML = '😾 Você perdeu...'
                subtituloFim.innerHTML = 'Sir Miagulino ri da sua derrota'
                telaFim.classList.add('ativa')
            }
        }

        function atualizarPlacar() {
            placar.innerHTML = `Você: ${placarPlayer} | Bot: ${placarBot} | Rank: ${rankPlayer}`
        }

        function atualizarRank() {
            if (placarPlayer <= 2) {
                rankPlayer = '🐭 Novato'
            } else if (placarPlayer <= 5) {
                rankPlayer = '🐱 Aprendiz'
            } else if (placarPlayer <= 7) {
                rankPlayer = '🐯 Mestre Felino'
            } else {
                rankPlayer = '😼 Lenda'
            }
        }

        function botPlay() {
            const chance = Math.random()

            if (dificuldade === 'facil') {
                // Gato Burro: sempre aleatório
                valorBot = Math.floor(Math.random() * 3)

            } else if (dificuldade === 'medio') {
                // Gato Inteligente: 40% de chance de trapacear (original)
                if (chance < 0.4) {
                    if (valor === 0) valorBot = 1
                    else if (valor === 1) valorBot = 2
                    else valorBot = 0
                } else {
                    valorBot = Math.floor(Math.random() * 3)
                }

            } else if (dificuldade === 'dificil') {
                // Super Inteligente: 80% de chance de trapacear
                if (chance < 0.8) {
                    if (valor === 0) valorBot = 1
                    else if (valor === 1) valorBot = 2
                    else valorBot = 0
                } else {
                    valorBot = Math.floor(Math.random() * 3)
                }
            }
        }
    </script>
</body>

</html>
